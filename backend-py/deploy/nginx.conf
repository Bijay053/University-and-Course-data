# Drop-in replacement for /etc/nginx/sites-available/default during cutover.
# Keeps the existing /api/* path layout, just swaps the upstream from PM2's
# Node process (port 8080) to gunicorn (port 8000).
upstream uni_api_py {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 50M;

    # React frontend bundle (built by `pnpm --filter @workspace/university-portal build`)
    root /root/University-and-Course-data/artifacts/university-portal/dist;
    index index.html;

    location /api/ {
        proxy_pass         http://uni_api_py;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
