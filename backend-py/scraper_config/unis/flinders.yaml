# Flinders University
# Hostname: www.flinders.edu.au
#
# Bug history / rationale:
#   - Course catalogue (~250 courses) is rendered via a JS-heavy listing page.
#     The orchestrator raises max_courses to 400 (hardcoded) to capture all
#     bachelor + masters + combined programmes.
#   - Combined/add-on degrees (e.g. "Add on Bachelor of Laws – Duration: 5 years")
#     are listed inline on main-degree pages.  The duration extractor now demotes
#     Pattern-0 matches inside combined-degree sentences (0.001× weight) so the
#     main programme's "Duration: N years" always wins.
#   - Social-footer icons (Bluesky, Facebook, Instagram, etc.) are hosted at
#     /reference-components/social-footer/ using generic AEM div wrappers with
#     no <footer> tag or "footer" class — the _SOCIAL_CHROME_PATH_RE regex in
#     per_course_vision.py catches them by URL path before they reach Gemini.
#   - SATAC application blocks on course pages include "Available to domestic
#     students only" even when the course IS available internationally.
#     _DOMESTIC_ONLY_RE intentionally excludes bare "domestic students only"
#     phrases for this reason — only explicit "this course is only available to
#     domestic/australian students" language triggers the filter.
#   - Tier-1 vision OCR (images NOT anchored inside the Entry Requirements DOM
#     section) hallucinated plausible-looking IELTS/PTE/TOEFL values from stock
#     photos and AEM content fragments on other courses' pages.  Sub-gates A+B
#     (IELTS-anchor mismatch / single-test-image filter) caught many cases but
#     not all — Gemini hallucinated 6 test values from a student-laptops stock
#     photo that was cross-contaminated from gc-digital-innovation---ai/.
#     Disabling tier-1 English OCR entirely is the correct fix: regex/structural
#     extractors reliably supply IELTS for every course that publishes it.
#     Tier-0 (DOM-anchored) images remain trusted should they ever appear.

discovery:
  # Flinders sitemap at https://www.flinders.edu.au/sitemap.xml lists all
  # course detail pages.  Supplementing BFS with sitemap ensures we capture
  # deep-faculty courses that BFS might miss after exhausting its page budget.
  always_sitemap_supplement: true

extraction:
  english:
    # Disable tier-1 (non-DOM-anchored) vision OCR for English test score
    # fields.  Tier-0 images (inside Entry Requirements DOM section) still
    # trusted.  Regex+structural extraction is sufficient for Flinders.
    trust_tier1_vision_ocr_english: false

  filters:
    domestic_only:
      # Explicitly set (same as the fail-open default) so behaviour is not
      # dependent on the config loader's fail-open policy.
      enabled: true
