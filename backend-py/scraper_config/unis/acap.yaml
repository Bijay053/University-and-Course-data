# Australian College of Applied Professions (ACAP)
# Hostname: www.acap.edu.au
#
# Bug history / rationale:
#   - Domestic-only filter: ACAP's course listing includes domestic-only programs
#     that are not marked as such.  Enabling the filter drops courses whose name
#     or metadata matches the _DOMESTIC_ONLY_RE patterns (domestic campus codes,
#     "domestic students only" text, etc.).
#   - Vision OCR hallucinations: Gemini consistently hallucinates IELTS/PTE scores
#     from ACAP's decorative counselling images.  trust_vision_ocr: false forces
#     the extractor to use HTML-only parsing for English requirements.
#   - Location string noise: ACAP emits '^Available in Perth' prefix cruft in some
#     location fields.  strip_patterns removes these before location parsing.
#   - NameError (re module) in single_course.py: FIXED in commit b935cb2 (Phase 4).
#     Graduate Diploma degree-level correction now uses _re alias correctly.
#
# DONE (Phase 3): domestic_only filter wired into staging gate.
# DONE (Phase 5): trust_vision_ocr: false wired — vision OCR skipped for ACAP.
# DONE (Phase 6): strip_patterns wired into location.extract() — ACAP footnote cruft removed.

extraction:
  english:
    trust_vision_ocr: false

  filters:
    domestic_only:
      enabled: true

  text_cleaning:
    location:
      strip_patterns:
        # ACAP footnote pattern: "Perth^ ^Available in Perth from Trimester 3, 2026"
        # The '^' is a CSS superscript footnote marker that the HTML extractor reads
        # as literal text.  This regex strips from the first "^ ^" sequence to
        # end-of-string, leaving only the real campus city names before the marker.
        # Also handles the degenerate case where the entire string IS the footnote
        # (e.g. "^ ^Available in Perth" with no leading city name → empty → null).
        - '\^\s*\^.*$'
        - '\(\s*domestic\s+only\s*\)'   # inline '(domestic only)' markers
